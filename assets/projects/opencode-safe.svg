<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect width="120" height="80" fill="#171614" rx="6"/>
  <!-- Shield shape -->
  <rect x="36" y="12" width="48" height="8" fill="#8A3B2E"/>
  <rect x="32" y="20" width="56" height="8" fill="#8A3B2E"/>
  <rect x="32" y="28" width="56" height="8" fill="#8A3B2E"/>
  <rect x="32" y="36" width="56" height="8" fill="#8A3B2E"/>
  <rect x="36" y="44" width="48" height="8" fill="#8A3B2E"/>
  <rect x="40" y="52" width="40" height="8" fill="#8A3B2E"/>
  <rect x="48" y="60" width="24" height="8" fill="#8A3B2E"/>
  <rect x="56" y="68" width="8" height="4" fill="#8A3B2E"/>
  <!-- Shield inner -->
  <rect x="40" y="20" width="40" height="8" fill="#6B2D22"/>
  <rect x="40" y="28" width="40" height="8" fill="#6B2D22"/>
  <rect x="40" y="36" width="40" height="8" fill="#6B2D22"/>
  <rect x="44" y="44" width="32" height="8" fill="#6B2D22"/>
  <rect x="48" y="52" width="24" height="8" fill="#6B2D22"/>
  <!-- Code brackets </> -->
  <!-- < -->
  <rect x="44" y="28" width="4" height="4" fill="#4EC9B0"/>
  <rect x="40" y="32" width="4" height="4" fill="#4EC9B0"/>
  <rect x="44" y="36" width="4" height="4" fill="#4EC9B0"/>
  <!-- / -->
  <rect x="56" y="28" width="4" height="4" fill="#F5F0E7"/>
  <rect x="54" y="32" width="4" height="4" fill="#F5F0E7"/>
  <rect x="52" y="36" width="4" height="4" fill="#F5F0E7"/>
  <!-- > -->
  <rect x="64" y="28" width="4" height="4" fill="#4EC9B0"/>
  <rect x="68" y="32" width="4" height="4" fill="#4EC9B0"/>
  <rect x="64" y="36" width="4" height="4" fill="#4EC9B0"/>
  <!-- Lock icon at top -->
  <rect x="54" y="10" width="12" height="4" fill="#FFD700" opacity="0.7"/>
  <rect x="52" y="6" width="4" height="8" fill="#FFD700" opacity="0.7"/>
  <rect x="64" y="6" width="4" height="8" fill="#FFD700" opacity="0.7"/>
  <rect x="54" y="4" width="12" height="4" fill="#FFD700" opacity="0.7"/>
